<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Post a New Job - JobPortal</title>
</head>
<body>
    <section class="fade-in" style="max-width: 800px; margin: 0 auto;">
        <div class="glass-card">
            <h2 style="margin-bottom: 2rem;"><i class="fas fa-plus-circle" style="color: var(--primary-color);"></i> Post a New Job</h2>
            
            <form th:action="@{/employer/post-job}" th:object="${job}" method="post">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Senior Frontend Developer" required>
                        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: #f87171; font-size: 0.8rem; margin-top: 0.25rem;"></p>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select th:field="*{category}" class="form-control" required>
                            <option value="IT & Software">IT & Software</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Finance">Finance</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Design">Design</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Location (City, State, Country)</label>
                        <input type="text" th:field="*{location}" class="form-control" placeholder="e.g. Austin, TX, USA" required>
                        <small style="color: var(--text-muted); font-size: 0.8rem;">Used for map geocoding on the job details page.</small>
                    </div>

                    <div class="form-group">
                        <label>Salary Range</label>
                        <input type="text" th:field="*{salary}" class="form-control" placeholder="e.g. $80,000 - $120,000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Required Skills (Comma separated)</label>
                    <input type="text" th:field="*{skillsRequired}" class="form-control" placeholder="e.g. Java, Spring Boot, React" required>
                </div>

                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" th:field="*{applicationDeadline}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="8" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                    <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color: #f87171; font-size: 0.8rem; margin-top: 0.25rem;"></p>
                </div>
                
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <a th:href="@{/dashboard}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Publish Job</button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
