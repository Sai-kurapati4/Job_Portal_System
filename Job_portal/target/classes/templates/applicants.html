<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Applicants for [[${job.title}]]</title>
</head>
<body>
    <section class="fade-in">
        <a th:href="@{/dashboard}" style="color: var(--text-muted); text-decoration: none; display: inline-block; margin-bottom: 1.5rem;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div class="glass-card" style="margin-bottom: 2rem;">
            <h2 style="margin-bottom: 0.5rem;"><i class="fas fa-users" style="color: var(--primary-color);"></i> Applicants for: <span th:text="${job.title}"></span></h2>
            <p style="color: var(--text-muted);">Manage and shortlist candidates who applied for this position.</p>
        </div>

        <div class="glass-card">
            <div th:if="${#lists.isEmpty(applicants)}" style="padding: 3rem; text-align: center; color: var(--text-muted);">
                <i class="fas fa-inbox" style="font-size: 3rem; opacity: 0.5; margin-bottom: 1rem;"></i>
                <p>No one has applied for this job yet.</p>
            </div>

            <div style="overflow-x: auto;" th:unless="${#lists.isEmpty(applicants)}">
                <table>
                    <thead>
                        <tr>
                            <th>Applicant Name</th>
                            <th>Email</th>
                            <th>Applied Date</th>
                            <th>Resume</th>
                            <th>Current Status</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applicants}">
                            <td style="font-weight: 500;" th:text="${app.user.fullName}"></td>
                            <td><a th:href="'mailto:' + ${app.user.email}" style="color: var(--primary-color); text-decoration: none;" th:text="${app.user.email}"></a></td>
                            <td th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy, HH:mm')}"></td>
                            <td>
                                <a th:href="@{/uploads/{url}(url=${app.resumeUrl})}" target="_blank" class="btn btn-outline" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">
                                    <i class="fas fa-file-pdf"></i> View Resume
                                </a>
                            </td>
                            <td>
                                <span th:if="${app.status == 'APPLIED'}" class="badge badge-blue">Pending</span>
                                <span th:if="${app.status == 'SHORTLISTED'}" class="badge badge-green">Shortlisted</span>
                                <span th:if="${app.status == 'REJECTED'}" class="badge badge-red">Rejected</span>
                            </td>
                            <td>
                                <form th:action="@{/employer/application/{id}/status(id=${app.id})}" method="post" style="display: flex; gap: 0.5rem;">
                                    <select name="status" class="form-control" style="padding: 0.3rem; width: 120px; font-size: 0.85rem;">
                                        <option value="APPLIED" th:selected="${app.status == 'APPLIED'}">Pending</option>
                                        <option value="SHORTLISTED" th:selected="${app.status == 'SHORTLISTED'}">Shortlist</option>
                                        <option value="REJECTED" th:selected="${app.status == 'REJECTED'}">Reject</option>
                                    </select>
                                    <button type="submit" class="btn btn-primary" style="padding: 0.3rem 0.6rem; font-size: 0.85rem;">Save</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
