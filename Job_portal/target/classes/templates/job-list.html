<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Browse Jobs - JobPortal</title>
</head>
<body>
    <section class="fade-in">
        <div class="glass-card" style="margin-bottom: 2rem;">
            <h2>Find Your Next Career</h2>
            <form th:action="@{/jobs}" method="get" style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Job title, skills, or company..." style="flex: 2; min-width: 250px;">
                <input type="text" name="location" th:value="${location}" class="form-control" placeholder="City, state, or 'Remote'" style="flex: 1; min-width: 150px;">
                <button type="submit" class="btn btn-primary" style="flex: 0 0 auto;">Search Jobs</button>
            </form>
        </div>

        <div class="job-grid">
            <div th:each="job : ${jobs}" class="glass-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;" th:text="${job.title}">Senior Developer</h3>
                    <p style="color: var(--primary-color); font-weight: 500; margin-bottom: 1rem;">
                        <i class="fas fa-building"></i> <span th:text="${job.employer.fullName}">Company</span> | 
                        <i class="fas fa-map-marker-alt"></i> <span th:text="${job.location}">Remote</span>
                    </p>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6;" th:text="${#strings.abbreviate(job.description, 120)}">
                        Job description snippet...
                    </p>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                        <span class="badge badge-blue" th:text="${job.category}">IT</span>
                        <span class="badge badge-green" th:text="${job.salary}">$100k</span>
                    </div>
                </div>
                <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline" style="text-align: center; width: 100%;">View Details</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(jobs)}" style="text-align: center; padding: 5rem; color: var(--text-muted);">
            <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
            <p>No jobs found matching your criteria. Try different keywords.</p>
        </div>
    </section>
</body>
</html>
