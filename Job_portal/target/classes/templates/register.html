<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Register - JobPortal</title>
</head>
<body>
    <section class="fade-in" style="max-width: 500px; margin: 2rem auto;">
        <div class="glass-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            
            <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm" autocomplete="off">
                <div th:if="${otpError}" class="badge badge-red" style="padding: 1rem; margin-bottom: 1rem; width: 100%; text-align: center; background: rgba(239, 68, 68, 0.2); color: #f87171;" th:text="${otpError}"></div>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a unique username" required autocomplete="new-username">
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: #f87171; font-size: 0.8rem; margin-top: 0.25rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="email" th:field="*{email}" id="emailInput" class="form-control" placeholder="email@example.com" required>
                        <button type="button" id="sendOtpBtn" class="btn btn-outline" style="white-space: nowrap;" onclick="sendOTP()">Send OTP</button>
                    </div>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #f87171; font-size: 0.8rem; margin-top: 0.25rem;"></p>
                    <p id="otpMessage" style="color: #34d399; font-size: 0.85rem; margin-top: 0.5rem; display: none;">OTP sent! Check your console/email.</p>
                </div>
                
                <div class="form-group" id="otpGroup" style="display: none; background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(99, 102, 241, 0.3);">
                    <label style="color: var(--primary-color);"><i class="fas fa-shield-alt"></i> Enter 6-Digit OTP</label>
                    <input type="text" name="otp" id="otpInput" class="form-control" placeholder="123456" style="border-color: var(--primary-color);">
                </div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label>Account Type</label>
                    <select th:field="*{role}" class="form-control" required>
                        <option value="STUDENT">Job Seeker (Student)</option>
                        <option value="EMPLOYER">Employer / Recruiter</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: #f87171; font-size: 0.8rem; margin-top: 0.25rem;"></p>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register & Verify</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary-color);">Login here</a>
            </p>
        </div>

        <script>
            function sendOTP() {
                const email = document.getElementById('emailInput').value;
                if (!email) {
                    alert("Please enter your email first");
                    return;
                }
                const btn = document.getElementById('sendOtpBtn');
                btn.disabled = true;
                btn.innerText = "Sending...";

                const csrfToken = document.querySelector('input[name="_csrf"]')?.value;
                let formData = new URLSearchParams();
                formData.append("email", email);
                if (csrfToken) formData.append("_csrf", csrfToken);

                fetch('/api/auth/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                })
                .then(response => response.text())
                .then(data => {
                    btn.innerText = "OTP Sent";
                    document.getElementById('otpMessage').style.display = 'block';
                    document.getElementById('otpGroup').style.display = 'block';
                    document.getElementById('otpInput').required = true;
                })
                .catch(error => {
                    alert("Error sending OTP");
                    btn.disabled = false;
                    btn.innerText = "Send OTP";
                });
            }
        </script>
    </section>
</body>
</html>
